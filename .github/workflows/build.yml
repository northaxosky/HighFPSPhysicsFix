name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (releasedbg / x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Need full history + tags so xmake.lua's `git describe` resolves
          # the current version (see PROJECT_VERSION_DESCRIBE in xmake.lua).
          fetch-depth: 0

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/.xmake/packages
          key: xmake-${{ runner.os }}-${{ hashFiles('xmake.lua', 'extern/CommonLibF4/xmake.lua', 'extern/CommonLibF4/lib/commonlib-shared/xmake.lua') }}
          restore-keys: xmake-${{ runner.os }}-

      - name: Configure
        run: xmake f -m releasedbg -y

      - name: Build
        run: xmake -j 8 -v

      - name: clang-format check (advisory)
        # The repo already ships a .clang-format. We run a dry-run check for
        # signal but do NOT fail the build on diffs (format gate is opt-in
        # until existing code is reformatted in a dedicated commit).
        continue-on-error: true
        shell: pwsh
        run: |
          $files = git ls-files src include | Where-Object { $_ -match '\.(cpp|h|hpp)$' }
          if ($files) {
            clang-format --dry-run --Werror $files
          }

      - name: Stage mod package
        shell: pwsh
        run: |
          $built = "build/windows/x64/releasedbg"
          $pkg   = "build/package/HighFPSPhysicsFix"
          New-Item -ItemType Directory -Force -Path "$pkg/F4SE/Plugins" | Out-Null
          Copy-Item "$built/HighFPSPhysicsFix.dll" "$pkg/F4SE/Plugins/"
          Copy-Item "$built/HighFPSPhysicsFix.pdb" "$pkg/F4SE/Plugins/"
          Copy-Item "HighFPSPhysicsFix.ini"        "$pkg/F4SE/Plugins/"
          Get-ChildItem -Recurse $pkg

      - name: Upload mod package (drop into MO2 / Data)
        uses: actions/upload-artifact@v4
        with:
          name: HighFPSPhysicsFix-mod-${{ github.sha }}
          path: build/package/HighFPSPhysicsFix/**
          if-no-files-found: error

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "HighFPSPhysicsFix-$tag.zip"
          Compress-Archive -Path "build/package/HighFPSPhysicsFix/F4SE" -DestinationPath $zip -Force
          "ZIP=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP }}
          generate_release_notes: true
