name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_BINARY_SOURCES: clear;x-gha,readwrite

jobs:
  build:
    name: Build (Release / x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Need full history + tags so CMake's `git describe` resolves the
          # current version (see CMakeLists.txt PROJECT_VERSION_FROM_GIT).
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Export GitHub Actions cache env (vcpkg)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'b472291f295551b7127359ea38fdd2ca092f6f1b'

      - name: Configure
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: cmake --preset vs2022-windows-vcpkg

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: clang-format check (advisory)
        # The repo already ships a .clang-format. We run a dry-run check for
        # signal but do NOT fail the build on diffs (Tier 3: format gate is
        # opt-in until existing code is reformatted in a dedicated commit).
        continue-on-error: true
        shell: pwsh
        run: |
          $files = git ls-files src include | Where-Object { $_ -match '\.(cpp|h|hpp)$' }
          if ($files) {
            clang-format --dry-run --Werror $files
          }

      - name: Stage mod package
        shell: pwsh
        run: |
          $pkg = "package/HighFPSPhysicsFix"
          New-Item -ItemType Directory -Force -Path "$pkg/F4SE/Plugins" | Out-Null
          Copy-Item "build/Release/HighFPSPhysicsFix.dll" "$pkg/F4SE/Plugins/"
          Copy-Item "build/Release/HighFPSPhysicsFix.pdb" "$pkg/F4SE/Plugins/"
          Copy-Item "HighFPSPhysicsFix.ini"               "$pkg/F4SE/Plugins/"
          Get-ChildItem -Recurse $pkg

      - name: Upload mod package (drop into MO2 / Data)
        uses: actions/upload-artifact@v4
        with:
          name: HighFPSPhysicsFix-mod-${{ github.sha }}
          path: package/HighFPSPhysicsFix/**
          if-no-files-found: error

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "HighFPSPhysicsFix-$tag.zip"
          Compress-Archive -Path "package/HighFPSPhysicsFix/F4SE" -DestinationPath $zip -Force
          "ZIP=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP }}
          generate_release_notes: true
